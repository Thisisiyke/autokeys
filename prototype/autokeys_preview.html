<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoKeys — iPhone 16 Plus Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'DM Sans', sans-serif;
    padding: 40px 20px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 55% at 50% 40%, rgba(29,158,117,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .label {
    color: rgba(255,255,255,0.28);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* iPhone 16 Plus: 430×932 logical px, bezels ~12px sides, 14px top/bottom */
  .phone {
    position: relative;
    width: 406px;
    height: 876px;
    border-radius: 56px;
    background: linear-gradient(155deg, #303030 0%, #1c1c1c 35%, #111 100%);
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.10),
      inset 0 0 0 1px rgba(255,255,255,0.05),
      0 50px 150px rgba(0,0,0,0.95),
      0 0 100px rgba(29,158,117,0.06);
    flex-shrink: 0;
  }

  /* Volume buttons left */
  .btn-silent {
    position: absolute;
    left: -3.5px; top: 120px;
    width: 3.5px; height: 28px;
    background: #282828;
    border-radius: 2px 0 0 2px;
  }
  .btn-vol-up {
    position: absolute;
    left: -3.5px; top: 164px;
    width: 3.5px; height: 60px;
    background: #282828;
    border-radius: 2px 0 0 2px;
  }
  .btn-vol-dn {
    position: absolute;
    left: -3.5px; top: 234px;
    width: 3.5px; height: 60px;
    background: #282828;
    border-radius: 2px 0 0 2px;
  }
  /* Power button right */
  .btn-power {
    position: absolute;
    right: -3.5px; top: 178px;
    width: 3.5px; height: 82px;
    background: #282828;
    border-radius: 0 2px 2px 0;
  }

  /* Screen cutout */
  .screen-area {
    position: absolute;
    top: 11px; left: 11px; right: 11px; bottom: 11px;
    border-radius: 47px;
    background: #000;
    overflow: hidden;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 13px;
    left: 50%;
    transform: translateX(-50%);
    width: 118px;
    height: 35px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .di-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #181818;
    box-shadow: 0 0 6px rgba(29,158,117,0.25);
  }
  .di-dot.camera {
    width: 11px; height: 11px;
    background: #141414;
    border: 1.5px solid #0a0a0a;
  }

  /* OS status bar */
  .os-status {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 58px;
    z-index: 9;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 10px;
    color: #111;
    font-family: 'DM Sans', sans-serif;
  }
  .os-time {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #111;
  }
  .os-icons {
    display: flex;
    align-items: center;
    gap: 5px;
    color: #111;
  }

  /* App iframe */
  .app-frame {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 47px;
  }

  /* Home bar */
  .home-bar {
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    z-index: 10;
  }

  /* Glass sheen */
  .sheen {
    position: absolute;
    inset: 11px;
    border-radius: 47px;
    background: linear-gradient(140deg, rgba(255,255,255,0.06) 0%, transparent 45%);
    pointer-events: none;
    z-index: 20;
  }

  .info-row {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .chip {
    font-size: 11px;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .chip-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #1D9E75;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="scene">
  <p class="label">iPhone 16 Plus &nbsp;&nbsp;·&nbsp;&nbsp; 430 × 932 pt &nbsp;&nbsp;·&nbsp;&nbsp; iOS 18</p>

  <div class="phone">

    <div class="btn-silent"></div>
    <div class="btn-vol-up"></div>
    <div class="btn-vol-dn"></div>
    <div class="btn-power"></div>

    <div class="screen-area">
      <!-- Dynamic Island -->
      <div class="dynamic-island">
        <div class="di-dot"></div>
        <div class="di-dot camera"></div>
      </div>

      <!-- The actual app -->
      <iframe
        class="app-frame"
        id="appFrame"
        sandbox="allow-scripts allow-same-origin allow-forms"
      ></iframe>

      <div class="home-bar"></div>
    </div>

    <div class="sheen"></div>
  </div>

  <div class="info-row">
    <div class="chip"><span class="chip-dot"></span> AutoKeys v1.0</div>
    <div class="chip"><span class="chip-dot"></span> 430pt · 3× scale</div>
    <div class="chip"><span class="chip-dot"></span> iOS 18 Dynamic Island</div>
  </div>
</div>
